basePath: /
definitions:
  github_com_DjordjeVuckovic_tusker_internal_api_dto.Article:
    properties:
      author:
        type: string
      content:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      language:
        type: string
      metadata:
        $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.ArticleMetadata'
      subtitle:
        type: string
      title:
        type: string
      url:
        format: string
        type: string
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.ArticleMetadata:
    properties:
      category:
        description: Content metadata
        type: string
      importedAt:
        description: System metadata
        type: string
      publishedAt:
        type: string
      sourceId:
        description: Essential source tracking
        type: string
      sourceName:
        type: string
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.ArticleSearchResult:
    properties:
      article:
        allOf:
        - $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.Article'
        description: Embedded Article struct for search results
      score:
        description: Score rank between 0 and 1
        type: number
      score_normalized:
        description: ScoreNormalized is the normalized(between 0-1) score
        type: number
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.BooleanParams:
    properties:
      expression:
        minLength: 1
        type: string
      language:
        type: string
    required:
    - expression
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.HybridParams:
    properties:
      k:
        minimum: 1
        type: integer
      language:
        type: string
      query:
        minLength: 1
        type: string
    required:
    - query
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.MatchParams:
    properties:
      field:
        type: string
      fuzziness:
        type: string
      language:
        type: string
      operator:
        type: string
      query:
        minLength: 1
        type: string
    required:
    - field
    - query
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.MultiMatchParams:
    properties:
      field_weights:
        additionalProperties:
          format: float64
          type: number
        type: object
      fields:
        items:
          type: string
        minItems: 1
        type: array
      language:
        type: string
      operator:
        type: string
      query:
        minLength: 1
        type: string
    required:
    - fields
    - query
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.PhraseParams:
    properties:
      fields:
        items:
          type: string
        minItems: 1
        type: array
      language:
        type: string
      query:
        minLength: 1
        type: string
      slop:
        maximum: 3
        minimum: 0
        type: integer
    required:
    - fields
    - query
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.QueryWrapper:
    properties:
      boolean:
        $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.BooleanParams'
      hybrid:
        $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.HybridParams'
      match:
        $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.MatchParams'
      multi_match:
        $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.MultiMatchParams'
      phrase:
        $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.PhraseParams'
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.SearchRequest:
    properties:
      cursor:
        type: string
      query:
        $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.QueryWrapper'
      size:
        minimum: 1
        type: integer
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.SearchResponse:
    properties:
      has_more:
        type: boolean
      hits:
        items:
          $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.ArticleSearchResult'
        type: array
      max_score:
        type: number
      next_cursor:
        type: string
      page_max_score:
        type: number
      total_matches:
        type: integer
    type: object
  github_com_DjordjeVuckovic_tusker_internal_api_dto.SemanticSearchResponse:
    properties:
      has_more:
        type: boolean
      hits:
        items:
          $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.Article'
        type: array
      next_cursor:
        type: string
    type: object
  github_com_DjordjeVuckovic_tusker_internal_types_query.Capabilities:
    properties:
      boolean:
        type: boolean
      match:
        type: boolean
      multi_match:
        type: boolean
      phrase:
        type: boolean
      semantic:
        type: boolean
      string_query:
        type: boolean
    type: object
info:
  contact:
    email: support@tusker.sh
    name: API Support
  description: A full-text and semantic search engine for exploring multilingual news headlines
    and articles
  license:
    name: Apache 2.0
    url: https://opensource.org/licenses/Apache-2.0
  termsOfService: http://swagger.io/terms/
  title: Tusker API
  version: "1.0"
paths:
  /v1/articles/search:
    get:
      consumes:
      - application/json
      description: Simple text search with automatic field selection and weighting.
        Cacheable and bookmarkable. Application determines optimal search strategy
        based on index configuration.
      parameters:
      - description: SearchStringQuery query text
        example: '"climate change"'
        in: query
        name: q
        required: true
        type: string
      - description: 'Results per page (default: 100, max: 10000)'
        example: 10
        in: query
        name: size
        type: integer
      - description: Pagination cursor (base64-encoded from previous response)
        in: query
        name: cursor
        type: string
      - description: 'SearchStringQuery language: english, serbian (default: english)'
        example: '"english"'
        in: query
        name: lang
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: SearchStringQuery results with pagination metadata
          schema:
            $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.SearchResponse'
        "400":
          description: Bad request - missing or invalid parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Simple query string search
      tags:
      - search
  /v1/articles/semantic_search:
    get:
      consumes:
      - application/json
      description: Perform vector-based semantic search using the embedding model.
        Supports pagination via cursor. Application determines optimal search strategy
        based on index configuration. Results are cacheable and bookmarkable.
      parameters:
      - description: SearchStringQuery query text
        example: '"climate change"'
        in: query
        name: q
        required: true
        type: string
      - description: 'Results per page (default: 100, max: 10000)'
        example: 10
        in: query
        name: size
        type: integer
      - description: Pagination cursor (base64-encoded from previous response)
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: SearchStringQuery results with pagination metadata
          schema:
            $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.SemanticSearchResponse'
        "400":
          description: Bad request - missing or invalid parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Vector-based semantic search
      tags:
      - search
  /v1/articles/structured:
    post:
      consumes:
      - application/json
      description: Execute structured search queries with explicit control over fields,
        weights, and operators. Supports match and multi_match query types. Follows
        Elasticsearch query DSL pattern.
      parameters:
      - description: Structured search request with query wrapper
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.SearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: SearchStringQuery results with pagination metadata
          schema:
            $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_api_dto.SearchResponse'
        "400":
          description: Bad request - invalid query structure or parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Query type not supported by searcher backend
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Structured search API
      tags:
      - search
  /v1/capabilities:
    get:
      description: Returns the search paradigms exposed by the running backend. Useful
        for clients to discover available capabilities (e.g. whether semantic search
        is enabled).
      produces:
      - application/json
      responses:
        "200":
          description: Supported search paradigms
          schema:
            $ref: '#/definitions/github_com_DjordjeVuckovic_tusker_internal_types_query.Capabilities'
      summary: Report supported search paradigms
      tags:
      - capabilities
swagger: "2.0"
