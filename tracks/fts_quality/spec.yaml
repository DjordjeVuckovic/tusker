schema_version: 1
id: fts_quality
kind: fts
description: "FTS quality across PG sequential, PG GIN, ParadeDB, TigerData pg_textsearch, and Elasticsearch"

defaults:
  pool_depth: 50
  judgments: lexical

engines:
  pg-seq:
    type: postgres
    connection: "postgresql://news_user:news_password@localhost:54320/news_db"
  pg-gin:
    type: postgres
    connection: "postgresql://news_user:news_password@localhost:54320/news_db"
  paradedb:
    type: postgres
    connection: "postgresql://news_user:news_password@localhost:54321/news_db"
  tiger:
    type: postgres
    connection: "postgresql://news_user:news_password@localhost:54322/news_db"
  elasticsearch:
    type: elasticsearch
    connection: "http://localhost:9200"
    index: articles
  api:
    type: api
    connection: "http://localhost:8080"

metrics:
  k_values: [3, 5, 10]
  max_k: 100
  relevance_threshold: 1

runs:
  warmup: 1
  iterations: 3

jobs:
  - name: "pg-gin-vs-paradedb-vs-es"
    suite: suite.yaml
    engines: [pg-gin, paradedb, elasticsearch]

  - name: "bm25-engines"
    suite: suite.yaml
    engines: [paradedb, tiger, elasticsearch]

  - name: "all-engines"
    suite: suite.yaml
    engines: [pg-seq, pg-gin, paradedb, tiger, elasticsearch]
