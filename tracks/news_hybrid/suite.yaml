schema_version: 1
id: news_hybrid_v1
name: "News Hybrid Search Benchmark v1"
description: "Hybrid BM25 + vector queries testing RRF fusion approaches"
version: "1.0.0"

corpus:
  name: news_hunter_articles
  source: "postgres://localhost:54320/news_db (articles)"

# NOTE: Hybrid queries combine keyword (BM25) and vector (embedding) signals.
# The {{embedding}} placeholder is replaced with the pre-computed float array.
# Document vectors live in the article_embeddings table (VECTOR(1024)), keyed by
# article_id — the same schema the tusker API uses for semantic search.
#
# RRF formula: score(d) = Σ 1/(k + rank_i(d))  where k=60 (standard constant)
#
# Prerequisites — apply migrations per engine (make migrate-up-all):
#   pg-rrf (native pgvector, db/migrations):
#     - articles + search_vector (tsvector) with its GIN index   -> FTS component
#     - article_embeddings (VECTOR(1024)) with an HNSW cosine idx -> vector component
#   paradedb-hybrid (db/parade_migrations):
#     - articles + BM25 index on (id, title, subtitle, content, description) -> @@@ component
#     - article_embeddings (VECTOR(1024)) with an HNSW cosine idx            -> vector component

templates:
  # pg-rrf: Reciprocal Rank Fusion of FTS + vector using CTEs.
  # Both sub-queries rank by their own signal; RRF normalizes and combines.
  - id: pg_rrf_fusion
    query: |
      WITH fts_ranked AS (
        SELECT id, ROW_NUMBER() OVER (ORDER BY ts_rank(search_vector, plainto_tsquery('english', '{{terms}}')) DESC) AS rank
        FROM articles
        WHERE search_vector @@ plainto_tsquery('english', '{{terms}}')
        LIMIT {{pool_size}}
      ),
      vec_ranked AS (
        SELECT article_id AS id, ROW_NUMBER() OVER (ORDER BY embedding <=> '{{embedding}}'::vector) AS rank
        FROM article_embeddings
        LIMIT {{pool_size}}
      ),
      rrf AS (
        SELECT
          COALESCE(fts.id, vec.id) AS id,
          COALESCE(1.0 / (60 + fts.rank), 0) + COALESCE(1.0 / (60 + vec.rank), 0) AS rrf_score
        FROM fts_ranked fts
        FULL OUTER JOIN vec_ranked vec ON fts.id = vec.id
      )
      SELECT id FROM rrf ORDER BY rrf_score DESC LIMIT {{limit}}

  # paradedb-hybrid: RRF of ParadeDB BM25 (pdb.score over @@@) + pgvector cosine.
  # @@@ matches the BM25 index fields; pdb.score(id) is the BM25 relevance score.
  # See https://docs.paradedb.com/documentation/full-text/hybrid
  - id: pdb_hybrid
    query: |
      WITH bm25_ranked AS (
        SELECT id, ROW_NUMBER() OVER (ORDER BY pdb.score(id) DESC) AS rank
        FROM articles
        WHERE title @@@ '{{terms}}' OR description @@@ '{{terms}}' OR content @@@ '{{terms}}'
        LIMIT {{pool_size}}
      ),
      vec_ranked AS (
        SELECT article_id AS id, ROW_NUMBER() OVER (ORDER BY embedding <=> '{{embedding}}'::vector) AS rank
        FROM article_embeddings
        LIMIT {{pool_size}}
      ),
      rrf AS (
        SELECT
          COALESCE(bm25.id, vec.id) AS id,
          COALESCE(1.0 / (60 + bm25.rank), 0) + COALESCE(1.0 / (60 + vec.rank), 0) AS rrf_score
        FROM bm25_ranked bm25
        FULL OUTER JOIN vec_ranked vec ON bm25.id = vec.id
      )
      SELECT id FROM rrf ORDER BY rrf_score DESC LIMIT {{limit}}

queries:
  # Hybrid queries cover cases where neither pure keyword nor pure semantic
  # is sufficient — the query has both a precise term and a semantic intent.

  - id: hybrid-climate-energy-policy
    description: "Keyword: 'climate'; Semantic: energy transition, policy implications"
    engines:
      pg-rrf:
        template: pg_rrf_fusion
        params: { terms: "climate energy policy", embedding: "{{precomputed}}", pool_size: 200, limit: 50 }
      paradedb-hybrid:
        template: pdb_hybrid
        params: { terms: "climate energy policy", embedding: "{{precomputed}}", pool_size: 200, limit: 50 }
      elasticsearch: |
        {
          "query": {
            "bool": {
              "should": [
                {
                  "multi_match": {
                    "query": "climate energy policy",
                    "fields": ["title^3", "description^2", "content"],
                    "boost": 0.5
                  }
                }
              ]
            }
          },
          "knn": {
            "field": "embedding",
            "query_vector": {{precomputed}},
            "k": 50,
            "num_candidates": 200,
            "boost": 0.5
          },
          "size": 50
        }

